
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>movie generator</title>
</head>
<body background="img/bgjapan.jpg" style="background-size: cover; background-repeat: no-repeat; background-attachment: fixed;">


  <h2>Movie generator</h2>
  <p>this movie generator uses API from TMDB the largest movie database in the world. 
  <br>
  Unfornately, Letterboxd does not have any of their data avaliable ) :</p>
  <hr>

  <table border="2" cellpadding="10" cellspacing="4" bgcolor="#ffffff">
    <tr>
      <td align="center" width="160">
        <b>DECADE</b><br><br>
        <font size="5" color="#cc0000" id="val-decade">—</font>
      </td>
      <td align="center" width="200">
        <b>GENRE</b><br><br>
        <font size="5" color="#cc0000" id="val-genre">—</font>
      </td>
    </tr>
  </table>

  <br>
  <input type="button" id="roll-btn" value=">>> RANDOMIZE <<<" onclick="roll()" style="font-size:16px; font-weight:bold; padding:6px 18px;">
  <br><br>

  <div id="status-box" style="display:none;">
    <table border="2" cellpadding="10" bgcolor="#ffffcc" width="500">
      <tr><td>
        <span id="status-text"></span><br><br>
        <input type="button" id="pick-btn" value=">>> PICK A MOVIE <<<" onclick="pickMovie()" style="font-size:14px; font-weight:bold; padding:5px 14px; display:none;">
      </td></tr>
    </table>
    <br>
  </div>

  <div id="movie-box" style="display:none;">
    <table border="2" cellpadding="10" bgcolor="#ccffcc" width="500">
      <tr>
        <td width="80" valign="top">
          <img id="movie-poster" src="" width="70" style="display:none; border:1px solid #999;">
        </td>
        <td valign="top">
          <font size="4"><b id="movie-title"></b></font><br>
          <font size="2" color="#333"><span id="movie-meta"></span></font><br><br>
          <font size="2" color="#444"><i><span id="movie-overview"></span></i></font><br><br>
          <font size="2" color="#000099"><span id="movie-director"></span></font><br><br>
          <a id="tmdb-link" href="#" target="_blank"><b>view on tmdb</b></a>
          &nbsp;&nbsp;
          <input type="button" value="pick another" onclick="pickMovie()" style="font-size:12px; padding:3px 8px;">
          &nbsp;&nbsp;
          <input type="button" value="roll again" onclick="roll()" style="font-size:12px; padding:3px 8px;">
        </td>
      </tr>
    </table>

    
  </div>

  <script>
    var API  = 'aeea40a6926e1499e4a4e6b3530ba86c';
    var BASE = 'https://api.themoviedb.org/3';

    var genres = [
      {label:'Action',         id:28},
      {label:'Adventure',      id:12},
      {label:'Animation',      id:16},
      {label:'Comedy',         id:35},
      {label:'Crime',          id:80},
      {label:'Documentary',    id:99},
      {label:'Drama',          id:18},
      {label:'Family',         id:10751},
      {label:'Fantasy',        id:14},
      {label:'History',        id:36},
      {label:'Horror',         id:27},
      {label:'Mystery',        id:9648},
      {label:'Romance',        id:10749},
      {label:'Science Fiction',id:878},
      {label:'Thriller',       id:53},
      {label:'War',            id:10752},
      {label:'Western',        id:37}
    ];

    var decades   = ['1940s','1950s','1960s','1970s','1980s','1990s','2000s','2010s','2020s'];
    var curDecade = null;
    var curGenre  = null;
    var totalPages = 0;

    function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function decadeToRange(d) {
      var start = parseInt(d.replace('s',''));
      return { from: start + '-01-01', to: (start + 9) + '-12-31' };
    }

    function setStatus(msg, showBtn) {
      document.getElementById('status-text').innerHTML = msg;
      document.getElementById('status-box').style.display = 'block';
      document.getElementById('pick-btn').style.display = showBtn ? 'inline' : 'none';
    }

    function animateBox(id, pool, final, ms, done) {
      var el = document.getElementById(id);
      var ticks = 14, iv = ms / ticks, n = 0;
      var t = setInterval(function() {
        var r = pool[Math.floor(Math.random() * pool.length)];
        el.innerHTML = typeof r === 'object' ? r.label : r;
        if (++n >= ticks) {
          clearInterval(t);
          el.innerHTML = typeof final === 'object' ? final.label : String(final);
          if (done) done();
        }
      }, iv);
    }

    function roll() {
      document.getElementById('status-box').style.display  = 'none';
      document.getElementById('movie-box').style.display   = 'none';
      document.getElementById('roll-btn').disabled         = true;

      curDecade = rnd(decades);
      curGenre  = rnd(genres);

      animateBox('val-decade', decades, curDecade, 700, null);
      animateBox('val-genre',  genres,  curGenre,  950, function() {
        document.getElementById('roll-btn').disabled = false;
        fetchCount();
      });
    }

    function buildUrl(page) {
      var range = decadeToRange(curDecade);
      return BASE + '/discover/movie?api_key=' + API
        + '&with_genres=' + curGenre.id
        + '&primary_release_date.gte=' + range.from
        + '&primary_release_date.lte=' + range.to
        + '&vote_count.gte=10'
        + '&sort_by=popularity.desc'
        + '&page=' + page;
    }

    function fetchCount() {
      setStatus('searching...', false);

      fetch(buildUrl(1))
        .then(function(r){ return r.json(); })
        .then(function(d) {
          var n = d.total_results || 0;
          totalPages = Math.min(d.total_pages || 0, 500);

          if (n === 0) {
            setStatus('<font color="#cc0000">no results &mdash; try rolling again</font>', false);
            return;
          }

          setStatus(
            '<b>' + n.toLocaleString() + ' movies</b> found for: '
            + curGenre.label + ' &bull; ' + curDecade,
            true
          );
        })
        .catch(function() {
          setStatus('<font color="#cc0000">error &mdash; check connection</font>', false);
        });
    }

    function pickMovie() {
      document.getElementById('movie-box').style.display = 'none';

      var page = Math.floor(Math.random() * Math.min(totalPages || 1, 100)) + 1;

      fetch(buildUrl(page))
        .then(function(r){ return r.json(); })
        .then(function(d) {
          var list = d.results;
          if (!list || !list.length) { alert('no movies found, try again'); return; }
          var m      = list[Math.floor(Math.random() * list.length)];
          var year   = m.release_date ? m.release_date.slice(0,4) : '?';
          var rating = m.vote_average ? m.vote_average.toFixed(1) + ' out of 10' : 'no rating';
          var blurb  = m.overview ? m.overview.slice(0,200) + (m.overview.length > 200 ? '...' : '') : '';

          document.getElementById('movie-title').innerHTML    = m.title;
          document.getElementById('movie-meta').innerHTML     = '(' + year + ') &bull; ' + rating;
          document.getElementById('movie-overview').innerHTML = blurb;
          document.getElementById('tmdb-link').href           = 'https://www.themoviedb.org/movie/' + m.id;
          document.getElementById('movie-director').innerHTML = 'fetching director...';

          var poster = document.getElementById('movie-poster');
          if (m.poster_path) {
            poster.src = 'https://image.tmdb.org/t/p/w92' + m.poster_path;
            poster.style.display = 'block';
          } else {
            poster.style.display = 'none';
          }

          document.getElementById('movie-box').style.display = 'block';

          fetch(BASE + '/movie/' + m.id + '/credits?api_key=' + API)
            .then(function(r){ return r.json(); })
            .then(function(c) {
              var dirs = c.crew.filter(function(p){ return p.job === 'Director'; });
              document.getElementById('movie-director').innerHTML = dirs.length
                ? 'directed by: <b>' + dirs.map(function(d){ return d.name; }).join(', ') + '</b>'
                : 'director unknown';
            });
        })
        .catch(function() { alert('error fetching movie'); });
    }
  </script>

</body>
</html>
